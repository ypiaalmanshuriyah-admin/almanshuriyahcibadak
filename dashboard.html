<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Admin</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f7fb;
      display:flex;
    }

    /* SIDEBAR */

    .sidebar{
      width:250px;
      height:100vh;
      background:#111827;
      color:white;
      padding:20px;
      position:fixed;
    }

    .sidebar h2{
      margin-bottom:40px;
      text-align:center;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .menu button{
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1f2937;
      color:white;
      cursor:pointer;
      transition:0.3s;
      font-size:15px;
    }

    .menu button:hover{
      background:#2563eb;
    }

    /* MAIN */

    .main{
      margin-left:250px;
      width:100%;
      padding:30px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .topbar h1{
      color:#111827;
    }

    .logout-btn{
      padding:10px 20px;
      border:none;
      border-radius:10px;
      background:red;
      color:white;
      cursor:pointer;
    }

    /* CARDS */

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    .card h3{
      margin-bottom:10px;
      color:#555;
    }

    .card p{
      font-size:28px;
      font-weight:bold;
      color:#2563eb;
    }

    /* FORM */

    .form-box{
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
      margin-bottom:30px;
    }

    .form-box h2{
      margin-bottom:20px;
    }

    input, textarea{
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:15px;
    }

    textarea{
      min-height:150px;
      resize:vertical;
    }

    .publish-btn{
      background:#2563eb;
      color:white;
      padding:14px 20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:15px;
    }

    .publish-btn:hover{
      background:#1e40af;
    }

    /* POSTS */

    .posts{
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    .post-item{
      border-bottom:1px solid #eee;
      padding:15px 0;
    }

    .post-item h3{
      margin-bottom:8px;
    }

    .actions{
      margin-top:10px;
    }

    .actions button{
      padding:8px 14px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin-right:10px;
    }

    .edit-btn{
      background:orange;
      color:white;
    }

    .delete-btn{
      background:red;
      color:white;
    }

  </style>
</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <h2>ADMIN PANEL</h2>

    <div class="menu">
      <button>Dashboard</button>
      <button>Berita</button>
      <button>Galeri</button>
      <button>Pengumuman</button>
      <button>Pengaturan</button>
    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <div class="topbar">

      <h1>Dashboard Admin</h1>

      <button class="logout-btn" onclick="logout()">
        Logout
      </button>

    </div>

    <!-- CARDS -->

    <div class="cards">

      <div class="card">
        <h3>Total Berita</h3>
        <p id="totalPosts">0</p>
      </div>

        <div class="card">
            <h3>Total Galeri</h3>
            <p id="totalGallery">0</p>

    </div>

    <!-- FORM -->

    <div class="form-box">

      <h2>Tambah Berita</h2>

      <input 
        type="text" 
        id="title" 
        placeholder="Judul berita"
      />

      <textarea 
        id="content" 
        placeholder="Isi berita"
      ></textarea>

      <button 
        class="publish-btn" 
        onclick="savePost()"
      >
        Publish Berita
      </button>

    </div>

    <!-- POSTS -->

    <div class="posts">

      <h2>Daftar Berita</h2>

      <div id="postsContainer"></div>

    </div>

  </div>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {

      getFirestore,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc

    }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import {

      getAuth,
      signOut

    }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // GANTI DENGAN CONFIG FIREBASE KAMU

    const firebaseConfig = {

      apiKey: "AIzaSyCATGNAyhBFAwx_zuocr99yq3guKCLDZGs",
      authDomain: "almanshuriyahcibadak-df616.firebaseapp.com",
      projectId: "almanshuriyahcibadak-df616",
      appId: "1:683338470732:web:4a2072c4b9aa5f444eabe9"

    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    const auth = getAuth(app);

    // SAVE POST

    window.savePost = async function(){

      const title =
      document.getElementById("title").value;

      const content =
      document.getElementById("content").value;

      if(title == "" || content == ""){
        alert("Isi semua field");
        return;
      }

      await addDoc(collection(db, "posts"), {

        title,
        content,
        createdAt:new Date()

      });

      alert("Berita berhasil dipublish");

      document.getElementById("title").value = "";
      document.getElementById("content").value = "";

      loadPosts();

    }

    // LOAD POSTS

    async function loadPosts(){

      const container =
      document.getElementById("postsContainer");

      container.innerHTML = "";

      const querySnapshot =
      await getDocs(collection(db, "posts"));

      let total = 0;

      querySnapshot.forEach((docItem)=>{

        total++;

        const post = docItem.data();

        container.innerHTML += `

          <div class="post-item">

            <h3>${post.title}</h3>

            <p>${post.content}</p>

            <div class="actions">

              <button class="delete-btn"
              onclick="deletePost('${docItem.id}')">

                Hapus

              </button>

            </div>

          </div>

        `;

      });

      document.getElementById("totalPosts")
      .innerText = total;

    }

    // DELETE POST

    window.deletePost = async function(id){

      if(confirm("Hapus berita ini?")){

        await deleteDoc(doc(db, "posts", id));

        loadPosts();

      }

    }

    // LOGOUT

    window.logout = function(){

      signOut(auth)
      .then(()=>{

        window.location.href = "admin.html";

      });

    }

    loadPosts();

  </script>

</body>
</html>
